<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rate Limiter Dashboard</title>
  <meta name="description" content="Dashboard to test and manage the rate limiter service." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fdfdfd;
      --surface: #ffffff;
      --surface-hover: #f9fafb;
      --border: #e5e7eb;
      --border-hover: #d1d5db;
      --text: #111827;
      --text-dim: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --green: #16a34a;
      --green-bg: #dcfce7;
      --red: #dc2626;
      --red-bg: #fee2e2;
      --yellow: #ca8a04;
      --yellow-bg: #fef9c3;
      --radius: 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #09090b;
        --surface: #18181b;
        --surface-hover: #27272a;
        --border: #27272a;
        --border-hover: #3f3f46;
        --text: #f4f4f5;
        --text-dim: #a1a1aa;
        --primary: #3b82f6;
        --primary-hover: #2563eb;
        --green: #22c55e;
        --green-bg: rgba(34, 197, 94, 0.15);
        --red: #ef4444;
        --red-bg: rgba(239, 68, 68, 0.15);
        --yellow: #eab308;
        --yellow-bg: rgba(234, 179, 8, 0.15);
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 900px; margin: 0 auto; padding: 40px 24px; }

    header { margin-bottom: 40px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--border); padding-bottom: 24px; }
    .logo-container {
      width: 40px; height: 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      color: var(--primary);
    }
    header h1 { font-size: 20px; font-weight: 600; }
    header p { color: var(--text-dim); font-size: 14px; margin-top: 4px; }

    .nav-tabs { display: flex; gap: 8px; margin-bottom: 32px; border-bottom: 1px solid var(--border); }
    .nav-tab {
      padding: 12px 16px; margin-bottom: -1px;
      background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--text-dim); font-size: 14px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
    }
    .nav-tab:hover { color: var(--text); }
    .nav-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    .section { display: none; }
    .section.active { display: block; }
    .section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
    
    /* Grid for Clients */
    .clients-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .client-card { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .client-header { display: flex; justify-content: space-between; align-items: center; }
    .client-id { font-weight: 600; font-size: 15px; }
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; background: var(--surface-hover); border: 1px solid var(--border); color: var(--text-dim); }
    
    .client-stats { display: flex; gap: 16px; font-size: 13px; color: var(--text-dim); }
    .stat-label { font-weight: 500; }
    .stat-value { color: var(--text); margin-left: 4px; }

    /* Forms */
    .form-grid { display: grid; gap: 20px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group label { font-size: 13px; font-weight: 500; color: var(--text); }
    .form-group input, .form-group select {
      padding: 10px 12px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-family: inherit; font-size: 14px;
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary); }
    .hint { font-size: 12px; color: var(--text-dim); }

    /* Buttons */
    .btn {
      padding: 10px 16px; border: none; border-radius: 6px; font-size: 14px; font-weight: 500;
      cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background: var(--surface-hover); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }

    .btn-small { padding: 8px 12px; font-size: 13px; width: 100%; }

    /* Results */
    .result-card { margin-top: 24px; padding: 24px; border-radius: var(--radius); text-align: center; border: 1px solid var(--border); }
    .result-card.allowed { background: var(--green-bg); border-color: rgba(34, 197, 94, 0.3); }
    .result-card.blocked { background: var(--red-bg); border-color: rgba(239, 68, 68, 0.3); }
    .result-icon { margin-bottom: 12px; display: inline-flex; }
    .result-card.allowed .result-icon { color: var(--green); }
    .result-card.blocked .result-icon { color: var(--red); }
    .result-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .result-stats { display: flex; justify-content: center; gap: 24px; margin-top: 20px; }
    .result-stat .value { font-size: 18px; font-weight: 600; }
    .result-stat .label { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

    /* Burst Tester */
    .burst-config { display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 24px; }
    .burst-config .form-group { flex: 1; min-width: 150px; }
    .burst-summary { display: flex; gap: 16px; margin-bottom: 16px; }
    .summary-item { flex: 1; padding: 16px; border: 1px solid var(--border); border-radius: var(--radius); text-align: center; background: var(--surface-hover); }
    .summary-value { font-size: 24px; font-weight: 600; }
    .summary-label { font-size: 12px; color: var(--text-dim); }
    
    .burst-log { border: 1px solid var(--border); border-radius: var(--radius); height: 300px; overflow-y: auto; background: var(--bg); padding: 8px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 13px; }
    .burst-entry { display: flex; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .burst-entry:last-child { border-bottom: none; }
    .log-status { font-weight: 600; }
    .log-status.allowed { color: var(--green); }
    .log-status.blocked { color: var(--red); }
    .log-status.error { color: var(--yellow); }

    /* Empty State */
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text-dim); }
    .empty-icon { margin-bottom: 16px; display: inline-flex; color: var(--border-hover); }

    /* Toast */
    .toast-container { position: fixed; top: 24px; right: 24px; z-index: 50; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 12px 16px; border-radius: var(--radius); background: var(--surface); border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); font-size: 14px; display: flex; align-items: center; gap: 8px; }
    .toast.success .toast-icon { color: var(--green); }
    .toast.error .toast-icon { color: var(--red); }

    /* SVG Icons */
    svg { width: 1em; height: 1em; }
  </style>
</head>
<body>

  <div class="toast-container" id="toastContainer"></div>

  <div class="container">
    <header>
      <div class="logo-container">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      </div>
      <div>
        <h1>Rate Limiter Dashboard</h1>
        <p>Manage endpoints, configure limits, and monitor traffic.</p>
      </div>
    </header>

    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="clients">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Clients
      </button>
      <button class="nav-tab" data-tab="register">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        Register
      </button>
      <button class="nav-tab" data-tab="check">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        Check Limit
      </button>
      <button class="nav-tab" data-tab="burst">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        Burst Test
      </button>
    </div>

    <!-- Clients Section -->
    <div class="section active" id="section-clients">
      <div class="section-title">
        Registered Clients
      </div>
      <div class="clients-grid" id="clientsGrid">
        <div class="empty-state" style="grid-column: 1/-1;">
          <div class="empty-icon">
             <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
          </div>
          <p>Loading clients...</p>
        </div>
      </div>
    </div>

    <!-- Register Section -->
    <div class="section" id="section-register">
      <div class="section-title">Register a New Client</div>
      <div class="card">
        <form class="form-grid" id="registerForm">
          <div class="form-row">
            <div class="form-group">
              <label for="reg-clientId">Client ID</label>
              <input type="text" id="reg-clientId" placeholder="e.g. web-app-prod" required />
            </div>
            <div class="form-group">
              <label for="reg-algorithm">Algorithm</label>
              <select id="reg-algorithm">
                <option value="fixed-window">Fixed Window</option>
                <option value="sliding-window">Sliding Window</option>
                <option value="token-bucket">Token Bucket</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="reg-limit">Max Requests</label>
              <input type="number" id="reg-limit" placeholder="10" min="1" value="10" required />
            </div>
            <div class="form-group">
              <label for="reg-windowMs">Time Window (ms)</label>
              <input type="number" id="reg-windowMs" placeholder="60000" min="1000" value="60000" required />
            </div>
          </div>
          <div class="form-row" id="refillRow" style="display: none;">
            <div class="form-group">
              <label for="reg-refillRate">Refill Rate (tokens/sec)</label>
              <input type="number" id="reg-refillRate" placeholder="1.0" min="0.1" step="0.1" value="1" />
            </div>
          </div>
          <div style="margin-top: 8px;">
            <button type="submit" class="btn btn-primary" id="registerBtn">
              Create Client
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Check Limit Section -->
    <div class="section" id="section-check">
      <div class="section-title">Check Rate Limit</div>
      <div class="card">
        <form class="form-grid" id="checkForm">
          <div class="form-row">
            <div class="form-group">
              <label for="check-clientId">Client ID</label>
              <input type="text" id="check-clientId" placeholder="e.g. web-app-prod" required />
            </div>
            <div class="form-group">
              <label for="check-endpoint">Endpoint Path (optional)</label>
              <input type="text" id="check-endpoint" placeholder="e.g. /api/users" />
            </div>
          </div>
          <div style="margin-top: 8px;">
            <button type="submit" class="btn btn-primary" id="checkBtn">
              Verify Access
            </button>
          </div>
        </form>
        <div id="checkResult"></div>
      </div>
    </div>

    <!-- Burst Test Section -->
    <div class="section" id="section-burst">
      <div class="section-title">Burst Traffic Simulator</div>
      <div class="card">
        <div class="burst-config">
          <div class="form-group">
            <label for="burst-clientId">Client ID</label>
            <input type="text" id="burst-clientId" placeholder="e.g. web-app-prod" required />
          </div>
          <div class="form-group">
            <label for="burst-count">Requests</label>
            <input type="number" id="burst-count" placeholder="20" min="1" max="200" value="20" />
          </div>
          <div class="form-group">
            <label for="burst-delay">Delay (ms)</label>
            <input type="number" id="burst-delay" placeholder="100" min="0" max="5000" value="100" />
          </div>
          <button class="btn btn-primary" id="burstBtn" onclick="startBurst()" style="height: 42px;">
            Run Simulation
          </button>
        </div>
        
        <div class="burst-summary" id="burstSummary" style="display: none;">
          <div class="summary-item">
            <div class="summary-label">TOTAL REQUESTS</div>
            <div class="summary-value" id="sumTotal">0</div>
          </div>
          <div class="summary-item">
            <div class="summary-label">ALLOWED</div>
            <div class="summary-value" id="sumAllowed" style="color: var(--green)">0</div>
          </div>
          <div class="summary-item">
            <div class="summary-label">BLOCKED</div>
            <div class="summary-value" id="sumBlocked" style="color: var(--red)">0</div>
          </div>
        </div>
        
        <div class="burst-log" id="burstLog" style="display: none;"></div>
      </div>
    </div>
  </div>

  <script>
    const API = '';

    // --- Tab Navigation ---
    document.querySelectorAll('.nav-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('section-' + tab.dataset.tab).classList.add('active');
      });
    });

    // --- Toast Notifications ---
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = 'toast ' + type;
      
      const iconSVG = type === 'success' 
        ? '<svg class="toast-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'
        : '<svg class="toast-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
        
      toast.innerHTML = iconSVG + ' <span>' + escapeHtml(message) + '</span>';
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    // --- Load Clients ---
    async function loadClients() {
      const grid = document.getElementById('clientsGrid');
      try {
        const res = await fetch(API + '/clients');
        if (!res.ok) throw new Error('Failed to load clients');
        const clients = await res.json();

        if (clients.length === 0) {
          grid.innerHTML = `
            <div class="empty-state" style="grid-column: 1/-1;">
              <div class="empty-icon"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div>
              <p>No clients registered. Create your first configuration to get started.</p>
            </div>`;
          return;
        }

        grid.innerHTML = clients.map(c => `
          <div class="card client-card">
            <div class="client-header">
              <div class="client-id">${escapeHtml(c.client_id)}</div>
              <span class="badge">${c.algorithm}</span>
            </div>
            <div class="client-stats">
              <div><span class="stat-label">Limit:</span><span class="stat-value">${c.max_requests}</span></div>
              <div><span class="stat-label">Window:</span><span class="stat-value">${c.window_ms}ms</span></div>
            </div>
            <button class="btn btn-secondary btn-small" onclick="testClient('${escapeHtml(c.client_id)}')">
              Test Configuration
            </button>
          </div>
        `).join('');
      } catch (err) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <p>Error loading clients checking connection.</p>
          </div>`;
      }
    }

    // --- Register Form ---
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      btn.disabled = true;
      btn.textContent = 'Creating...';

      const body = {
        clientId: document.getElementById('reg-clientId').value.trim(),
        algorithm: document.getElementById('reg-algorithm').value,
        limit: parseInt(document.getElementById('reg-limit').value),
        windowMs: parseInt(document.getElementById('reg-windowMs').value),
      };

      if (body.algorithm === 'token-bucket') {
        body.refillRate = parseFloat(document.getElementById('reg-refillRate').value);
      }

      try {
        const res = await fetch(API + '/clients', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.message || 'Server error');
        }

        showToast('Client created successfully');
        document.getElementById('registerForm').reset();
        loadClients();
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Client';
      }
    });

    document.getElementById('reg-algorithm').addEventListener('change', (e) => {
      document.getElementById('refillRow').style.display = e.target.value === 'token-bucket' ? 'grid' : 'none';
    });

    // --- Check Limit Form ---
    document.getElementById('checkForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('checkBtn');
      btn.disabled = true;
      btn.textContent = 'Verifying...';

      const body = { clientId: document.getElementById('check-clientId').value.trim() };
      const endpoint = document.getElementById('check-endpoint').value.trim();
      if (endpoint) body.endpoint = endpoint;

      try {
        const res = await fetch(API + '/check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await res.json();

        if (res.status === 404) {
          throw new Error('Client not found');
        }

        const isAllowed = data.allowed;
        const icon = isAllowed 
          ? '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'
          : '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';

        document.getElementById('checkResult').innerHTML = `
          <div class="result-card ${isAllowed ? 'allowed' : 'blocked'}">
            <div class="result-icon">${icon}</div>
            <div class="result-title">${isAllowed ? 'Request Allowed' : 'Rate Limit Exceeded'}</div>
            <div style="color: var(--text-dim); font-size: 14px;">${isAllowed ? 'The system is ready to process this request.' : 'Further requests will be blocked until the window resets.'}</div>
            <div class="result-stats">
              <div class="result-stat"><div class="value">${data.remaining}</div><div class="label">REMAINING</div></div>
              <div class="result-stat"><div class="value">${data.limit}</div><div class="label">LIMIT</div></div>
            </div>
          </div>`;
      } catch (err) {
        document.getElementById('checkResult').innerHTML = `
          <div class="result-card blocked" style="background: var(--surface); border-color: var(--border);">
            <div class="result-title" style="color: var(--text);">Error</div>
            <div style="color: var(--text-dim); font-size: 14px;">${escapeHtml(err.message)}</div>
          </div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Verify Access';
      }
    });

    function testClient(clientId) {
      document.getElementById('check-clientId').value = clientId;
      document.querySelector('[data-tab="check"]').click();
    }

    // --- Burst Test ---
    let burstRunning = false;

    async function startBurst() {
      if (burstRunning) return;

      const clientId = document.getElementById('burst-clientId').value.trim();
      if (!clientId) { showToast('Please enter a Client ID', 'error'); return; }

      const count = parseInt(document.getElementById('burst-count').value) || 20;
      const delay = parseInt(document.getElementById('burst-delay').value) || 100;

      burstRunning = true;
      const btn = document.getElementById('burstBtn');
      btn.disabled = true;
      btn.textContent = 'Simulating...';

      const log = document.getElementById('burstLog');
      const summary = document.getElementById('burstSummary');
      log.style.display = 'block';
      summary.style.display = 'flex';
      log.innerHTML = '';

      let allowed = 0, blocked = 0, errors = 0;
      updateSum(0, 0, 0);

      for (let i = 1; i <= count; i++) {
        try {
          const res = await fetch(API + '/check', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ clientId }),
          });
          const data = await res.json();

          if (res.status === 404) {
            errors++;
            addLog(i, 'error', 'Error', 'Client not found');
          } else if (data.allowed) {
            allowed++;
            addLog(i, 'allowed', 'Allowed', `Remaining: ${data.remaining}`);
          } else {
            blocked++;
            addLog(i, 'blocked', 'Blocked', 'Limit reached');
          }
        } catch (err) {
          errors++;
          addLog(i, 'error', 'Error', 'Network issue');
        }

        updateSum(allowed + blocked + errors, allowed, blocked);
        if (i < count && delay > 0) await new Promise(r => setTimeout(r, delay));
      }

      burstRunning = false;
      btn.disabled = false;
      btn.textContent = 'Run Simulation';
    }

    function addLog(num, type, status, detail) {
      const log = document.getElementById('burstLog');
      const div = document.createElement('div');
      div.className = 'burst-entry';
      div.innerHTML = `
        <span style="color: var(--text-dim); width: 40px;">#${num}</span>
        <span class="log-status ${type}" style="flex: 1;">${status}</span>
        <span style="color: var(--text-dim);">${detail}</span>`;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    function updateSum(total, allowed, blocked) {
      document.getElementById('sumTotal').textContent = total;
      document.getElementById('sumAllowed').textContent = allowed;
      document.getElementById('sumBlocked').textContent = blocked;
    }

    function escapeHtml(str) {
      const d = document.createElement('div'); d.textContent = str; return d.innerHTML;
    }

    loadClients();
  </script>
</body>
</html>
